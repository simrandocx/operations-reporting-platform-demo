      toast(e.message, "error");
    }
    setScanning(false);
  };

  const updateReviewRow = (idx, field, value) => {
    setReviewScan(rs => {
      const rows = [...rs.rows];
      rows[idx] = { ...rows[idx], [field]: value };
      return { ...rs, rows };
    });
  };

  const removeReviewRow = idx => {
    setReviewScan(rs => ({ ...rs, rows: rs.rows.filter((_,i) => i!==idx) }));
  };

  const addReviewRow = () => {
    setReviewScan(rs => ({ ...rs, rows: [...rs.rows, { linen_item:"", quantity:"", ocr_confidence:"manual" }] }));
  };

  const confirmScan = async () => {
    const validRows = reviewScan.rows.filter(r => r.linen_item && r.quantity);
    if (validRows.length === 0) {
      toast("Add at least one item with a quantity before saving.", "error"); return;
    }
    try {
      const result = await api(`/pool-stock/scan/${reviewScan.scan_id}/confirm`, {
        method: "POST",
        body: { items: validRows.map(r => ({ linen_item: r.linen_item, quantity: parseInt(r.quantity) })) }
      });
      toast(`Saved ${result.items_saved} item(s) from the scan.`, "ok");
      setReviewScan(null);
      load();
    } catch (e) { toast(e.message, "error"); }
  };

  const discardScan = async () => {
    if (!confirm("Discard this scan? Nothing will be saved.")) return;
    await api(`/pool-stock/scan/${reviewScan.scan_id}/discard`, { method: "POST" });
    toast("Scan discarded.", "ok");
    setReviewScan(null);
  };

  return (
    <div className="page">
      {quickEntry && (
        <QuickEntry
          hotel={quickEntry.hotel}
          date={quickEntry.date}
          items={quickEntry.items}
          toast={toast}
          onDone={() => {
            setQuickEntry(null);
            setGridView({ hotel_id: quickEntry.hotel.id, hotel_name: quickEntry.hotel.name, year, month });
            load();
          }}
        />
      )}

      <div className="flex-between page-header">
        <div>
          <div className="page-title">Pool Stock</div>
          <div className="page-sub">{MONTHS[month]} {year} — {summary?.overall_total?.toLocaleString()||0} items total</div>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-primary" onClick={openQuickEntry}>⚡ Quick Entry</button>
          <button className="btn btn-secondary" onClick={openScanUpload}>📷 Scan</button>
          <button className="btn btn-secondary" onClick={openNew}>+ Add entry</button>
        </div>
      </div>

      {showQuickSetup && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowQuickSetup(false)}>
          <div className="modal" style={{width:420}}>
            <div className="modal-header">
              <span className="modal-title">⚡ Quick Entry</span>
              <button className="modal-close" onClick={()=>setShowQuickSetup(false)}>×</button>
            </div>
            <div className="modal-body">
              <p className="text-soft" style={{fontSize:13,marginBottom:16}}>
                Enter all items for one hotel in one go — one item at a time, full screen, keyboard only. Press Enter to move to the next item.
              </p>
              <div className="form-grid form-grid-2">
                <div className="form-row">
                  <label className="form-label">Hotel</label>
                  <select className="input" value={quickForm.hotel_id}
                    onChange={e=>setQuickForm({...quickForm, hotel_id:e.target.value})}>
                    <option value="">Select…</option>
                    {hotels.map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label className="form-label">Date</label>
                  <input type="date" className="input" value={quickForm.entry_date}
                    onChange={e=>setQuickForm({...quickForm, entry_date:e.target.value})} />
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowQuickSetup(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={startQuickEntry}>Start →</button>
            </div>
          </div>
        </div>
      )}

      {/* Pool Stock Summary — hotel tabs matching Monthly Results style */}
      {hotels.length > 0 && activeSummaryHotel && (
        <div className="section-gap">
          <div className="card" style={{padding:"10px 14px", marginBottom:16}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {hotels.filter(h=>h.customer_type==="hotel").map(h=>(
                <button key={h.id} className="btn btn-sm"
                  style={{background:activeSummaryHotel?.id===h.id?"var(--navy)":"var(--sky)",
                    color:activeSummaryHotel?.id===h.id?"#fff":"var(--navy)",border:"none"}}
                  onClick={()=>setActiveSummaryHotel(h)}>
                  {h.name}
                </button>
              ))}
            </div>
          </div>
          <HotelStockGrid
            hotel_id={activeSummaryHotel.id}
            hotel_name={activeSummaryHotel.name}
            year={year}
            month={month}
            onClose={null}
          />
        </div>
      )}

      {gridView && (
        <HotelStockGrid
          hotel_id={gridView.hotel_id}
          hotel_name={gridView.hotel_name}
          year={gridView.year}
          month={gridView.month}
          onClose={() => setGridView(null)}
        />
      )}

      {summary && Object.keys(summary.checks.duplicate_packing_list_refs||{}).length > 0 && (
        <div className="alert alert-warn section-gap">
          ⚠ Duplicate packing list references detected: {Object.keys(summary.checks.duplicate_packing_list_refs).join(", ")}
        </div>
      )}

      <div className="card">
        <div className="card-header">
          <span className="card-title">All Entries</span>
          <div className="flex gap-8" style={{flexWrap:"wrap"}}>
            <input type="date" className="input input-sm"
              value={filter.date}
              onChange={e=>setFilter({...filter, date:e.target.value})}
              title="Filter by exact date" />
            {filter.date && (
              <button className="btn btn-secondary btn-xs" onClick={()=>setFilter({...filter,date:""})}>
                Clear date
              </button>
            )}
            <select className="input input-sm" value={filter.hotel_id} onChange={e=>setFilter({...filter,hotel_id:e.target.value})}>
              <option value="">All hotels</option>
              {hotels.map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
            </select>
            <select className="input input-sm" value={filter.linen_item} onChange={e=>setFilter({...filter,linen_item:e.target.value})}>
              <option value="">All items</option>
              {LINEN_ITEMS.map(i=><option key={i} value={i}>{i}</option>)}
            </select>
            <input className="input input-sm" placeholder="Ref…" value={filter.ref} onChange={e=>setFilter({...filter,ref:e.target.value})} style={{width:100}} />
          </div>
        </div>
        <div className="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Hotel</th><th>Linen Item</th>
                <th style={{textAlign:"right"}}>Qty</th>
                <th>Packing List Ref</th><th>Notes</th><th></th>
              </tr>
            </thead>
            <tbody>
              {entries.length === 0 && (
                <tr><td colSpan={6}><div className="empty-state"><div className="empty-icon">📦</div><div className="empty-title">No entries yet</div><div>Use Quick Entry or Add entry above.</div></div></td></tr>
              )}
              {(() => {
                // Group entries by date and render with date header rows
                const groups = [];
                let currentDate = null;
                entries.forEach(e => {
                  if (e.entry_date !== currentDate) {
                    currentDate = e.entry_date;
                    const d = new Date(e.entry_date + "T00:00:00");
                    const label = d.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"long", year:"numeric" });
                    groups.push({ type:"date", date: e.entry_date, label });
                  }
                  groups.push({ type:"entry", entry: e });
                });
                return groups.map((g, i) => {
                  if (g.type === "date") return (
                    <tr key={`date-${g.date}`}>
                      <td colSpan={6} style={{
                        background:"var(--sky)", fontWeight:700, fontSize:12,
                        color:"var(--navy)", padding:"8px 14px", letterSpacing:"0.04em",
                        textTransform:"uppercase", borderTop: i > 0 ? "2px solid var(--sky-deep)" : "none"
                      }}>
                        {g.label}
                      </td>
                    </tr>
                  );
                  const e = g.entry;
                  return (
                    <tr key={e.id}>
                      <td>{e.hotel_name}</td>
                      <td>{e.linen_item}</td>
                      <td className="num mono">{e.quantity}</td>
                      <td className="mono" style={{fontSize:12}}>{e.packing_list_ref||"—"}</td>
                      <td className="text-soft">{e.notes||"—"}</td>
                      <td>
                        <div className="flex gap-8">
                          <button className="btn btn-secondary btn-xs" onClick={()=>openEdit(e)}>Edit</button>
                          <button className="btn btn-danger btn-xs" onClick={()=>del(e.id)}>Del</button>
                        </div>
                      </td>
                    </tr>
                  );
                });
              })()}
            </tbody>
          </table>
        </div>
      </div>

      {showModal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">{editing?"Edit entry":"Add pool stock entry"}</span>
              <button className="modal-close" onClick={()=>setShowModal(false)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-grid form-grid-2">
                <div className="form-row">
                  <label className="form-label">Hotel</label>
                  <select className="input" value={form.hotel_id} onChange={e=>setForm({...form,hotel_id:e.target.value})}>
                    <option value="">Select…</option>
                    {hotels.map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label className="form-label">Date</label>
                  <input type="date" className="input" value={form.entry_date} onChange={e=>setForm({...form,entry_date:e.target.value})} />
                </div>
                <div className="form-row">
                  <label className="form-label">Linen Item</label>
                  <select className="input" value={form.linen_item} onChange={e=>setForm({...form,linen_item:e.target.value})}>
                    <option value="">Select…</option>
                    {LINEN_ITEMS.map(i=><option key={i} value={i}>{i}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label className="form-label">Quantity</label>
                  <input type="number" min="0" className="input" value={form.quantity} onChange={e=>setForm({...form,quantity:e.target.value})} />
                </div>
                <div className="form-row">
                  <label className="form-label">Packing List Ref</label>
                  <input className="input" value={form.packing_list_ref} onChange={e=>setForm({...form,packing_list_ref:e.target.value})} placeholder="e.g. PL-01-2503-12" />
                </div>
                <div className="form-row">
                  <label className="form-label">Notes</label>
                  <input className="input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Optional" />
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={save}>Save</button>
            </div>
          </div>
        </div>
      )}

      {/* Step 1: upload a photo of the packing list */}
      {showScanUpload && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowScanUpload(false)}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">📷 Scan a packing list</span>
              <button className="modal-close" onClick={()=>setShowScanUpload(false)}>×</button>
            </div>
            <div className="modal-body">
              <p className="text-soft" style={{fontSize:13, marginBottom:16}}>
                Upload a photo of the filled-in packing list. The system will read the numbers
                and show them to you on the next screen — nothing is saved until you confirm it looks right.
              </p>
              <div className="form-grid form-grid-2">
                <div className="form-row">
                  <label className="form-label">Hotel</label>
                  <select className="input" value={scanForm.hotel_id} onChange={e=>setScanForm({...scanForm,hotel_id:e.target.value})}>
                    <option value="">Select…</option>
                    {hotels.map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label className="form-label">Date</label>
                  <input type="date" className="input" value={scanForm.entry_date} onChange={e=>setScanForm({...scanForm,entry_date:e.target.value})} />
                </div>
              </div>
              <div className="form-row" style={{marginTop:16}}>
                <label className="form-label">Photo</label>
                <input type="file" accept="image/*" className="input"
                  onChange={e=>setScanFile(e.target.files[0])} />
                {scanFile && (
                  <div style={{marginTop:10}}>
                    <img src={URL.createObjectURL(scanFile)} alt="Preview"
                      style={{maxWidth:"100%", maxHeight:200, borderRadius:6, border:"1px solid var(--rule)"}} />
                  </div>
                )}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowScanUpload(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={runScan} disabled={scanning}>
                {scanning ? "Scanning…" : "Scan photo"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Step 2: review and correct what was detected before saving */}
      {reviewScan && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&null}>
          <div className="modal" style={{ width: 660 }}>
            <div className="modal-header">
              <span className="modal-title">Review scanned items — {reviewScan.hotel_name}</span>
              <button className="modal-close" onClick={discardScan}>×</button>
            </div>
            <div className="modal-body">
              {reviewScan.warning && (
                <div className="alert alert-warn" style={{marginBottom:16}}>⚠ {reviewScan.warning}</div>
              )}
              {reviewScan.using_template && (
                <div className="alert alert-ok" style={{marginBottom:14}}>
                  ✓ Using {reviewScan.hotel_name}'s template — item names are pre-filled in the correct order.
                  Just check the quantities and correct any misread numbers.
                </div>
              )}
              <p className="text-soft" style={{fontSize:13, marginBottom:14}}>
                Item names are filled in from the hotel's known packing list.
                Check each quantity — correct any that look wrong, leave blank any items that weren't packed today.
                Nothing saves until you click Confirm.
              </p>
              <div className="tbl-wrap" style={{ maxHeight:420, overflowY:"auto" }}>
                <table>
                  <thead>
                    <tr>
                      <th style={{minWidth:220}}>Linen Item</th>
                      <th style={{textAlign:"right", minWidth:120}}>Quantity Packed</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {reviewScan.rows.map((row, idx) => (
                      <tr key={idx} style={{ background: row.quantity === "" ? "#FFFBEB" : "transparent" }}>
                        <td>
                          {row.ocr_confidence === "manual" ? (
                            <select className="input input-sm" value={row.linen_item}
                              onChange={e=>updateReviewRow(idx,"linen_item",e.target.value)}>
                              <option value="">Select item…</option>
                              {LINEN_ITEMS.map(i=><option key={i} value={i}>{i}</option>)}
                            </select>
                          ) : (
                            <span style={{fontSize:13, fontWeight:500}}>{row.linen_item}</span>
                          )}
                        </td>
                        <td style={{padding:"5px 8px"}}>
                          <input type="number" min="0" className="input input-money input-sm"
                            value={row.quantity}
                            placeholder="0"
                            onChange={e=>updateReviewRow(idx,"quantity",e.target.value)} />
                        </td>
                        <td>
                          <button className="btn btn-danger btn-xs" onClick={()=>removeReviewRow(idx)}>✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <button className="btn btn-secondary btn-sm" style={{marginTop:12}} onClick={addReviewRow}>
                + Add a missed item
              </button>
            </div>
            <div className="modal-footer">
              <button className="btn btn-danger" onClick={discardScan}>Discard scan</button>
              <button className="btn btn-primary" onClick={confirmScan}>Confirm and save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// COMPARISON PAGE
// ─────────────────────────────────────────────────────────────────────────────
function ComparisonPage({ year, month }) {
  const [hotels, setHotels] = useState([]);
  const [messages, setMessages] = useState([
    { role: "system", text: "Tap a question below to get started." }
  ]);
  const [activeQuestion, setActiveQuestion] = useState(null); // which preset is being configured
  const [form, setForm] = useState({}); // answers being filled in for the active question
  const [loading, setLoading] = useState(false);

  useEffect(() => { api("/hotels").then(h => setHotels(h.filter(x=>x.active_status))); }, []);

  const todayStr = `${year}-${String(month).padStart(2,"0")}-01`;

  const PRESETS = [
    {
      id: "hotel_month",
      label: "How did a hotel do in a given month?",
      icon: "🏨",
      fields: ["hotel", "dateA"],
    },
    {
      id: "two_hotels",
      label: "Compare two hotels for a month",
      icon: "⇄",
      fields: ["hotelA", "hotelB", "dateA"],
    },
    {
      id: "two_periods",
      label: "Compare two different time periods",
      icon: "📅",
      fields: ["hotelOrAll", "dateA", "dateB"],
    },
    {
      id: "biggest_mover",
      label: "What's our biggest mover this month?",
      icon: "📈",
      fields: ["dateA"],
    },
    {
      id: "missing_data",
      label: "Which hotels are missing data this month?",
      icon: "⚠",
      fields: ["dateA"],
    },
  ];

  const startQuestion = (preset) => {
    setActiveQuestion(preset);
    setForm({ dateA: todayStr, dateB: todayStr, hotel: "", hotelA: "", hotelB: "", hotelOrAll: "all" });
  };

  const cancelQuestion = () => { setActiveQuestion(null); setForm({}); };

  const dateToYM = (dateStr) => {
    const [y, m] = dateStr.split("-");
    return { year: Number(y), month: Number(m) };
  };

  const pushMessage = (msg) => setMessages(prev => [...prev, msg]);

  const askPreset = async () => {
    setLoading(true);
    const p = activeQuestion;
    const a = dateToYM(form.dateA);
    const b = dateToYM(form.dateB);

    // Build a human-readable version of the question for the chat log
    let questionText = p.label;
    const hotelName = id => hotels.find(h => String(h.id)===String(id))?.name || "this hotel";

    try {
      if (p.id === "hotel_month") {
        questionText = `How did ${hotelName(form.hotel)} do in ${MONTHS[a.month]} ${a.year}?`;
        const summary = await api(`/monthly-results/summary/${a.year}/${a.month}`);
        const row = summary.rows.find(r => String(r.hotel_id) === String(form.hotel));
        pushMessage({ role: "user", text: questionText });
        if (!row) {
          pushMessage({ role: "answer", text: `No entries found for ${hotelName(form.hotel)} in ${MONTHS[a.month]} ${a.year}.` });
        } else {
          pushMessage({
            role: "answer",
            text: `${hotelName(form.hotel)} made ${fmt(row.total_income)} in ${MONTHS[a.month]} ${a.year}, across ${row.days_entered} day(s) of entries.`,
            detail: `Guest: ${fmt(row.guest_laundry_income)} · Staff: ${fmt(row.staff_laundry_income)} · Flat: ${fmt(row.flat_laundry_income)}`
          });
        }
      }

      else if (p.id === "two_hotels") {
        questionText = `Compare ${hotelName(form.hotelA)} and ${hotelName(form.hotelB)} for ${MONTHS[a.month]} ${a.year}`;
        const summary = await api(`/monthly-results/summary/${a.year}/${a.month}`);
        const rowA = summary.rows.find(r => String(r.hotel_id) === String(form.hotelA));
        const rowB = summary.rows.find(r => String(r.hotel_id) === String(form.hotelB));
        pushMessage({ role: "user", text: questionText });
        const totalA = rowA?.total_income || 0;
        const totalB = rowB?.total_income || 0;
        const diff = totalA - totalB;
        const leader = diff === 0 ? null : (diff > 0 ? hotelName(form.hotelA) : hotelName(form.hotelB));
        pushMessage({
          role: "answer",
          text: leader
            ? `${leader} earned more — ${fmt(Math.abs(diff))} ahead in ${MONTHS[a.month]} ${a.year}.`
            : `Both hotels earned exactly the same in ${MONTHS[a.month]} ${a.year}.`,
          detail: `${hotelName(form.hotelA)}: ${fmt(totalA)} · ${hotelName(form.hotelB)}: ${fmt(totalB)}`
        });
      }

      else if (p.id === "two_periods") {
        const scopeLabel = form.hotelOrAll === "all" ? "all hotels" : hotelName(form.hotelOrAll);
        questionText = `Compare ${scopeLabel} — ${MONTHS[a.month]} ${a.year} vs ${MONTHS[b.month]} ${b.year}`;
        const params = new URLSearchParams({ year_a: a.year, month_a: a.month, year_b: b.year, month_b: b.month });
        if (form.hotelOrAll !== "all") params.set("hotel_id", form.hotelOrAll);
        const result = await api(`/compare?${params}`);
        pushMessage({ role: "user", text: questionText });
        const dir = result.change >= 0 ? "up" : "down";
        pushMessage({
          role: "answer",
          text: `${scopeLabel === "all hotels" ? "Total revenue" : scopeLabel} went ${dir} ${fmt(Math.abs(result.change))} (${result.pct_change != null ? Math.abs(result.pct_change)+"%" : "—"}) from ${result.period_a.label} to ${result.period_b.label}.`,
          detail: `${result.period_a.label}: ${fmt(result.grand_total_a)} · ${result.period_b.label}: ${fmt(result.grand_total_b)}`
        });
      }

      else if (p.id === "biggest_mover") {
        questionText = `What's our biggest mover in ${MONTHS[a.month]} ${a.year}?`;
        const ranking = await api(`/analytics/ranking/${a.year}/${a.month}`);
        pushMessage({ role: "user", text: questionText });
        const withGrowth = ranking.rankings.filter(r => r.revenue_growth_pct != null);
        if (withGrowth.length === 0) {
          pushMessage({ role: "answer", text: `Not enough history yet to calculate growth for ${MONTHS[a.month]} ${a.year}.` });
        } else {
          const up = withGrowth.reduce((best,r) => r.revenue_growth_pct > (best?.revenue_growth_pct ?? -Infinity) ? r : best, null);
          const down = withGrowth.reduce((worst,r) => r.revenue_growth_pct < (worst?.revenue_growth_pct ?? Infinity) ? r : worst, null);
          pushMessage({
            role: "answer",
            text: `${up.hotel_name} grew the most (+${up.revenue_growth_pct}%). ${down.hotel_name} dropped the most (${down.revenue_growth_pct}%).`,
            detail: `Compared to the previous month.`
          });
        }
      }

      else if (p.id === "missing_data") {
        questionText = `Which hotels are missing data in ${MONTHS[a.month]} ${a.year}?`;
        const checks = await api(`/analytics/checks/${a.year}/${a.month}`);
        pushMessage({ role: "user", text: questionText });
        if (checks.missing_hotels.length === 0) {
          pushMessage({ role: "answer", text: `Every active hotel has at least one entry for ${MONTHS[a.month]} ${a.year}.` });
        } else {
          pushMessage({
            role: "answer",
            text: `${checks.missing_hotels.length} hotel(s) have no entries yet for ${MONTHS[a.month]} ${a.year}:`,
            detail: checks.missing_hotels.join(", ")
          });
        }
      }
    } catch (e) {
      pushMessage({ role: "answer", text: `Couldn't get an answer: ${e.message}` });
    }

    setLoading(false);
    setActiveQuestion(null);
    setForm({});
  };

  const isFormReady = () => {
    if (!activeQuestion) return false;

  return (
    <div className="page">

      {/* Inline form for the selected question */}
      {activeQuestion && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">{activeQuestion.icon} {activeQuestion.label}</span>
            <button className="modal-close" onClick={cancelQuestion}>×</button>

          <div className="card-body">
            <div className="form-grid form-grid-2">
              {activeQuestion.fields.includes("hotel") && (
                <div className="form-row">
                  <label className="form-label">Hotel</label>
                  <select className="input" value={form.hotel} onChange={e=>setForm({...form, hotel:e.target.value})}>

              {activeQuestion.fields.includes("hotelA") && (
                <div className="form-row">
                  <label className="form-label">First hotel</label>
                  <select className="input" value={form.hotelA} onChange={e=>setForm({...form, hotelA:e.target.value})}>
                    <option value="">Select a hotel…</option>
                    {hotels.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                  </select>
                </div>
              )}
              {activeQuestion.fields.includes("hotelB") && (
                <div className="form-row">
                  <label className="form-label">Second hotel</label>
                  <select className="input" value={form.hotelB} onChange={e=>setForm({...form, hotelB:e.target.value})}>
                    <option value="">Select a hotel…</option>
                    {hotels.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}
                  </select>
                </div>
              )}
              {activeQuestion.fields.includes("hotelOrAll") && (
                <div className="form-row">
                  <label className="form-label">Hotel</label>
                  <select className="input" value={form.hotelOrAll} onChange={e=>setForm({...form, hotelOrAll:e.target.value})}>
                    <option value="all">All hotels combined</option>
                    {hotels.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}

// EXPORTS PAGE
// ─────────────────────────────────────────────────────────────────────────────
function ExportsPage({ year, month }) {
  const dl = path => { window.open(`${API}${path}?year=${year}&month=${month}`, "_blank"); };

  const [backupHistory, setBackupHistory] = useState(null);
  const [backingUp, setBackingUp] = useState(false);
  const [backupMessage, setBackupMessage] = useState(null);

  const loadBackupHistory = () => api("/backup/history").then(setBackupHistory);
  useEffect(() => { loadBackupHistory(); }, []);

  const runBackup = async () => {
    setBackingUp(true);
    setBackupMessage(null);
    try {
      const result = await api("/backup/run", { method: "POST" });
      setBackupMessage({ type: "ok", text: `Backup saved successfully (${result.filename}).` });
      loadBackupHistory();
    } catch (e) {
      setBackupMessage({ type: "error", text: `Backup failed: ${e.message}` });
    }
    setBackingUp(false);
  };

  const formatLastBackup = (iso) => {
    if (!iso) return "No backups yet";
    const d = new Date(iso);
    return d.toLocaleString("en-GB", { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Export</div>
        <div className="page-sub">Download Excel files for {MONTHS[month]} {year}</div>
      </div>

      <div style={{ display:"grid", gap:16, maxWidth:600 }}>
        {[
          { title:"Monthly Results", desc:"All hotel income figures, totals, and statuses", path:"/exports/monthly-results", icon:"📊" },
          { title:"Pool Stock Summary", desc:"All linen entries with a summary sheet by hotel and item", path:"/exports/pool-stock", icon:"🛏️" },
          { title:"Hotel Performance Ranking", desc:"Revenue ranking with growth and contribution percentages", path:"/exports/ranking", icon:"🏆" },
        ].map(ex=>(
          <div className="card" key={ex.title}>
            <div className="card-body" style={{ display:"flex", alignItems:"center", gap:20 }}>
              <div style={{ fontSize:36 }}>{ex.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:15, marginBottom:3 }}>{ex.title}</div>
                <div className="text-soft" style={{ fontSize:13 }}>{ex.desc}</div>
              </div>
              <button className="btn btn-primary" onClick={()=>dl(ex.path)}>
                ↓ Download
              </button>
            </div>
          </div>
        ))}
      </div>

      <div className="page-header" style={{ marginTop:32 }}>
        <div className="page-title" style={{ fontSize:18 }}>Backup</div>
        <div className="page-sub">Keep a safety copy of all your data, separate from this computer</div>
      </div>

      <div className="card" style={{ maxWidth:600 }}>
        <div className="card-body">
          <div className="flex-between" style={{ alignItems:"flex-start" }}>
            <div>
              <div style={{ fontWeight:600, fontSize:14, marginBottom:4 }}>
                Last backup: {backupHistory ? formatLastBackup(backupHistory.last_backup_at) : "Loading…"}
              </div>
              <div className="text-soft" style={{ fontSize:12 }}>
                {backupHistory ? `${backupHistory.total_count} backup(s) kept` : ""}
              </div>
            </div>
            <button className="btn btn-primary" onClick={runBackup} disabled={backingUp}>
              {backingUp ? "Backing up…" : "🔒 Back up now"}
            </button>
          </div>

          {backupMessage && (
            <div className={`alert ${backupMessage.type === "ok" ? "alert-ok" : "alert-error"}`} style={{ marginTop:14 }}>
              {backupMessage.text}
            </div>
          )}

          <p className="text-soft" style={{ fontSize:12, marginTop:14, lineHeight:1.6 }}>
            This saves a complete copy of all hotels, daily entries, and pool stock to a backup folder.
            It's a good habit to do this at the end of each working day — especially before this computer
            is restarted or updated.
          </p>
        </div>
      </div>
    </div>
  );
}

const PC_CATEGORIES = [
  "Canteen Food","Staff Canteen","Staff Benefit","Staff Uniform",
  "Postage","Purchases","Motor Expense","Travel","Misc",
  "P&S","Cleaning","Carpet Cleaner","French Polisher",
  "Waste Removal","Paint Supplies","Advance","Compensation",
  "Carpet Cleaners Parking/Electric","Other",
];

function PettyCashPage({ year, month, toast }) {
  const [vouchers, setVouchers]   = useState([]);
  const [breakdown, setBreakdown] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing]     = useState(null);
  const [printAll, setPrintAll]   = useState(false);
  const [printOne, setPrintOne]   = useState(null);
  const [activeTab, setActiveTab] = useState("vouchers");

  const emptyForm = () => ({
    voucher_date: `${year}-${String(month).padStart(2,"0")}-01`,
    required_for: "", category: "Misc", customCategory: "", passed_by: "", notes: "",
    items: [{ description:"", amount_gbp:"", gross:"", vat:"" }],
  });
  const [form, setForm] = useState(emptyForm);

  const load = useCallback(() => {
    Promise.all([
      api(`/petty-cash/vouchers?year=${year}&month=${month}`),
      api(`/petty-cash/breakdown/${year}/${month}`),
    ]).then(([v, b]) => { setVouchers(v); setBreakdown(b); });
  }, [year, month]);

  useEffect(() => { load(); }, [load]);

  const openNew = () => { setEditing(null); setForm(emptyForm()); setShowModal(true); };
  const openEdit = (v) => {
    setEditing(v);
    const isKnownCategory = PC_CATEGORIES.includes(v.category);
    setForm({
      voucher_date: v.voucher_date,
      required_for: v.required_for,
      category: isKnownCategory ? v.category : "Other",
      customCategory: isKnownCategory ? "" : v.category,
      passed_by: v.passed_by || "",
      notes: v.notes || "",
      items: (v.items||[]).length > 0
        ? v.items.map(i => ({ description: i.description, amount_gbp: String(i.amount_gbp), gross: String(i.gross||""), vat: String(i.vat||"") }))
        : [{ description:"", amount_gbp:"", gross:"", vat:"" }],
    });
    setShowModal(true);
  };

  const addItem = () => setForm(f => ({ ...f, items: [...f.items, { description:"", amount_gbp:"", gross:"", vat:"" }] }));
  const removeItem = idx => setForm(f => ({ ...f, items: f.items.filter((_,i) => i!==idx) }));
  const setItem = (idx, field, value) => setForm(f => {
    const items = [...f.items]; items[idx] = { ...items[idx], [field]: value }; return { ...f, items };
  });

  const voucherTotal = form.items.reduce((s, i) => s + (parseFloat(i.amount_gbp)||0), 0);

  const saveVoucher = async () => {
    if (!form.required_for.trim()) { toast("Required For is needed.", "error"); return; }
    if (form.category === "Other" && !form.customCategory?.trim()) { toast("Please describe the category.", "error"); return; }
    const items = form.items.filter(i => i.description || i.amount_gbp);
    try {
      const finalCategory = form.category === "Other" ? (form.customCategory.trim() || "Other") : form.category;
      const body = { ...form, category: finalCategory, items: items.map(i => ({
        description: i.description,
        amount_gbp:  parseFloat(i.amount_gbp) || 0,
        gross:       parseFloat(i.gross) || parseFloat(i.amount_gbp) || 0,
        vat:         parseFloat(i.vat) || 0,
      }))};
      if (editing) {
        await api(`/petty-cash/vouchers/${editing.id}`, { method:"PATCH", body });
        toast("Voucher updated.", "ok");
      } else {
        await api("/petty-cash/vouchers", { method:"POST", body });
        toast("Voucher saved.", "ok");
      }
      setShowModal(false); setEditing(null); setForm(emptyForm()); load();
    } catch(e) { toast(e.message, "error"); }
  };

  const deleteVoucher = async (id) => {
    if (!confirm("Delete this voucher?")) return;
    await api(`/petty-cash/vouchers/${id}`, { method:"DELETE" });
    toast("Deleted.", "ok"); load();
  };

  const dlExport = () => window.open(`${API}/petty-cash/export/${year}/${month}`, "_blank");

  // ── Compact voucher card for batch print ──
  const VoucherCard = ({ v }) => {
    const items = v.items||[];
    const blankRows = Math.max(2, 5 - items.length);
    const rows = [...items, ...Array(blankRows).fill({ description:"", amount_gbp:"" })];
    return (
      <div style={{
        border:"1px solid #000", padding:"5px 7px",
        fontFamily:"Arial, sans-serif", fontSize:8.5,
        boxSizing:"border-box", background:"#fff",
        breakInside:"avoid", pageBreakInside:"avoid",
      }}>
        <div style={{textAlign:"center", fontWeight:700, fontSize:9.5, letterSpacing:1, marginBottom:3}}>
          PETTY CASH VOUCHER
        </div>
        <div style={{display:"flex", justifyContent:"space-between", fontSize:8, marginBottom:2}}>
          <span><strong>Date:</strong> {v.voucher_date}</span>
          <span><strong>Category:</strong> {v.category}</span>
        </div>
        <div style={{marginBottom:2, fontSize:8}}><strong>Required For:</strong> {v.required_for}</div>
        <table style={{width:"100%", borderCollapse:"collapse", fontSize:8, marginBottom:3}}>
          <thead>
            <tr>
              <th style={{border:"1px solid #000", padding:"1px 3px", textAlign:"left", background:"#e8edf5"}}>Description</th>
              <th style={{border:"1px solid #000", padding:"1px 3px", textAlign:"right", width:26, background:"#e8edf5"}}>£</th>
              <th style={{border:"1px solid #000", padding:"1px 3px", textAlign:"right", width:22, background:"#e8edf5"}}>P</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((item, i) => {
              const amt = parseFloat(item.amount_gbp)||0;
              return (
                <tr key={i}>
                  <td style={{border:"1px solid #000", padding:"1px 3px", height:13}}>{item.description||""}</td>
                  <td style={{border:"1px solid #000", padding:"1px 3px", textAlign:"right"}}>{amt>0?Math.floor(amt):""}</td>
                  <td style={{border:"1px solid #000", padding:"1px 3px", textAlign:"right"}}>{amt>0?String(Math.round((amt-Math.floor(amt))*100)).padStart(2,"0"):""}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr>
              <td style={{border:"1px solid #000", padding:"1px 3px", fontWeight:700, background:"#f5f5f5"}}>TOTAL</td>
              <td style={{border:"1px solid #000", padding:"1px 3px", textAlign:"right", fontWeight:700, background:"#f5f5f5"}}>{Math.floor(v.total_amount)}</td>
              <td style={{border:"1px solid #000", padding:"1px 3px", textAlign:"right", fontWeight:700, background:"#f5f5f5"}}>{String(Math.round((v.total_amount-Math.floor(v.total_amount))*100)).padStart(2,"0")}</td>
            </tr>
          </tfoot>
        </table>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:6}}>
          <div>
            <div style={{borderBottom:"1px solid #000", height:14}}></div>
            <div style={{fontSize:7, marginTop:1}}>SIGNATURE</div>
          </div>
          <div>
            <div style={{borderBottom:"1px solid #000", height:14, fontSize:8}}>{v.passed_by||""}</div>
            <div style={{fontSize:7, marginTop:1}}>PASSED BY</div>
          </div>
        </div>
      </div>
    );
  };

  if (printAll) return (
    <div>
      <style>{`
        @media print {
          .no-print { display: none !important; }
          @page { size: A4 portrait; margin: 6mm; }
          .voucher-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: auto;
            gap: 3mm;
            width: 198mm;
          }
          .page-break { page-break-after: always; margin-bottom: 0 !important; }
          body { margin: 0; }
        }
        .voucher-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 6px;
          max-width: 800px;
        }
      `}</style>
      <div className="no-print" style={{padding:"12px 24px",background:"var(--navy)",display:"flex",alignItems:"center",gap:12}}>
        <span style={{color:"#fff",fontWeight:600}}>🖨 Print Preview — {vouchers.length} voucher(s) · {MONTHS[month]} {year} · 6 per page</span>

                      </tr>

              </tbody>

                <tr className="tfoot-row">

                  {PC_CATEGORIES.map(cat => (

      )}

      {showModal && (

            <div className="modal-body">

                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr>
                      <th style={{textAlign:"left",padding:"6px 8px",background:"var(--sky)",fontSize:11}}>Description <span className="text-soft">(opt)</span></th>
                      <th style={{textAlign:"right",padding:"6px 8px",background:"var(--sky)",fontSize:11,width:110}}>Amount £ *</th>
                      <th style={{textAlign:"right",padding:"6px 8px",background:"var(--sky)",fontSize:11,width:90}}>Gross £ <span className="text-soft">(opt)</span></th>
                      <th style={{textAlign:"right",padding:"6px 8px",background:"var(--sky)",fontSize:11,width:80}}>VAT £ <span className="text-soft">(opt)</span></th>
                      <th style={{width:32}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {form.items.map((item,idx)=>(
                      <tr key={idx} style={{borderBottom:"1px solid var(--rule)"}}>
                        <td style={{padding:"5px 6px"}}>
                          <input className="input input-sm" style={{width:"100%"}}
                            value={item.description} placeholder="e.g. Milk, cleaning spray"
                            onChange={e=>setItem(idx,"description",e.target.value)} />
                        </td>
                        <td style={{padding:"5px 6px"}}>
                          <input type="number" step="0.01" min="0" className="input input-money input-sm"
                            value={item.amount_gbp} placeholder="0.00"
                            onChange={e=>setItem(idx,"amount_gbp",e.target.value)} />
                        </td>
                        <td style={{padding:"5px 6px"}}>
                          <input type="number" step="0.01" min="0" className="input input-money input-sm"
                            value={item.gross} placeholder="0.00"
                            onChange={e=>setItem(idx,"gross",e.target.value)} />
                        </td>
                        <td style={{padding:"5px 6px"}}>
                          <input type="number" step="0.01" min="0" className="input input-money input-sm"
                            value={item.vat} placeholder="0.00"
                            onChange={e=>setItem(idx,"vat",e.target.value)} />
                        </td>
                        <td style={{padding:"5px 6px"}}>
                          {form.items.length > 1 && (
                            <button className="btn btn-danger btn-xs" onClick={()=>removeItem(idx)}>✕</button>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <button className="btn btn-secondary btn-sm" style={{marginTop:8}} onClick={addItem}>+ Add item</button>
              </div>

              <div style={{marginTop:16,padding:"12px 16px",background:"var(--sky)",borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:600,fontSize:14}}>Voucher Total</span>
                <span style={{fontWeight:700,fontSize:22,color:"var(--navy)",fontFamily:"var(--font-mono)"}}>{fmt(voucherTotal)}</span>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveVoucher}>{editing ? "Save changes" : "Save voucher"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function BackupReminder() {
  const [show, setShow] = useState(false);
  const [backingUp, setBackingUp] = useState(false);
  const [done, setDone] = useState(false);

  const todayKey = () => {
    const d = new Date();
    return `laundry_backup_reminder_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  useEffect(() => {
    const checkTime = () => {
      const now = new Date();
      const hour = now.getHours();
      const minute = now.getMinutes();
      // Window is 16:00-16:30 (4:00-4:30pm)
      const inReminderWindow = hour === 16 && minute <= 30;
      const alreadyHandledToday = window.sessionStorage.getItem(todayKey());
      if (inReminderWindow && !alreadyHandledToday) {
        setShow(true);
      }
    };
    checkTime();
    const interval = setInterval(checkTime, 60000); // check once a minute
    return () => clearInterval(interval);
  }, []);

  const dismiss = () => {
    window.sessionStorage.setItem(todayKey(), "dismissed");
    setShow(false);
  };

  const backupNow = async () => {
    setBackingUp(true);
    try {
      await api("/backup/run", { method: "POST" });
      window.sessionStorage.setItem(todayKey(), "backed_up");
      setDone(true);
      setTimeout(() => setShow(false), 1800);
    } catch (e) {
      setBackingUp(false);
    }
  };

  if (!show) return null;

  return (
    <div className="overlay" style={{ zIndex: 200 }}>
      <div className="modal" style={{ width: 380 }}>
        <div className="modal-header">
          <span className="modal-title">🔒 End-of-day backup</span>
          <button className="modal-close" onClick={dismiss}>×</button>
        </div>
        <div className="modal-body">
          {done ? (
            <div className="alert alert-ok">✓ Backed up successfully. Have a good evening!</div>
          ) : (
            <p style={{ fontSize:13.5, lineHeight:1.6 }}>
              It's around end-of-day. Want to save a backup copy of today's work before you finish up?
            </p>
          )}
        </div>
        {!done && (
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={dismiss}>Not now</button>
            <button className="btn btn-primary" onClick={backupNow} disabled={backingUp}>
              {backingUp ? "Backing up…" : "Back up now"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {

        <div className="topbar">

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
