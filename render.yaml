services:
  - type: web
    name: operations-reporting-dashboard-demo
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    # --workers 1 is intentional — see Procfile comment: visitor sandboxes
    # live in process memory and must all land on the same worker.
    startCommand: "gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 1"
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: FLASK_DEBUG
        value: "false"
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: OCR_SPACE_API_KEY
        sync: false  # set manually in the Render dashboard if you want OCR enabled
